<!DOCTYPE html>
<html>
<head>
  <title>Live Gunshot Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #map { height: 100vh; }
    .distance-popup {
      font-size: 14px;
      font-weight: bold;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([13.0037, 77.5449], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);

    let userMarker = null;
    let distanceLine = null;
    let distancePopup = null;
    let latestGunshotMarker = null;
    const gunshotMarkers = [];

    function fetchGunshots() {
      fetch('/api/gunshots')
        .then(res => res.json())
        .then(data => {
          if (!data.length) return;

          // Only update map with new markers if new ones arrived
          const latest = data[data.length - 1];
          const latestLatLng = [parseFloat(latest.latitude), parseFloat(latest.longitude)];

          // If we already placed this latest marker, don't repeat
          if (gunshotMarkers.length === 0 || gunshotMarkers[gunshotMarkers.length - 1].options.msg !== latest.msg) {
            const marker = L.marker(latestLatLng, { msg: latest.msg }).addTo(map)
              .bindPopup(`Gunshot #${latest.msg}<br>Confidence: ${latest.confidence}`)
              .openPopup();
            gunshotMarkers.push(marker);

            // Update latest marker reference
            latestGunshotMarker = marker;
          }

          // Recompute user line if user location exists
          if (userMarker) {
            drawDistanceLine();
          }
        });
    }

    function drawDistanceLine() {
      if (!userMarker || !latestGunshotMarker) return;

      const userLatLng = userMarker.getLatLng();
      const gunshotLatLng = latestGunshotMarker.getLatLng();

      // Remove old line and popup
      if (distanceLine) map.removeLayer(distanceLine);
      if (distancePopup) map.removeLayer(distancePopup);

      distanceLine = L.polyline([userLatLng, gunshotLatLng], { color: 'red', dashArray: '6, 6' }).addTo(map);

      const distance = map.distance(userLatLng, gunshotLatLng) / 1000; // in km
      distancePopup = L.popup()
        .setLatLng(userLatLng)
        .setContent(`<div class="distance-popup">Distance: ${distance.toFixed(2)} km</div>`)
        .openOn(map);
    }

    function trackUser() {
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser');
        return;
      }

      navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        if (!userMarker) {
          userMarker = L.marker([lat, lng], {
            icon: L.icon({
              iconUrl: 'https://cdn-icons-png.flaticon.com/512/64/64113.png',
              iconSize: [30, 30]
            })
          }).addTo(map).bindPopup("📍 You are here").openPopup();
        } else {
          userMarker.setLatLng([lat, lng]);
        }

        drawDistanceLine();
      }, err => {
        alert('Could not get your location');
      }, {
        enableHighAccuracy: true,
        maximumAge: 1000
      });
    }

    trackUser();
    fetchGunshots();
    setInterval(fetchGunshots, 5000);
  </script>
</body>
</html>
